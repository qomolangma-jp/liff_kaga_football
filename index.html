<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>参加者登録｜サッカー加賀地区トレセン</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; padding: 0; margin: 0; background: #f0f0f0;}
    h2{margin: 0; font-size: 1.3rem;}
    .container { max-width: 480px; margin: 0 auto; background: #fff; padding: 30px 15px;}
    label { display: block; margin-top: 25px; font-weight: bold; }
    .row-flex { display: flex; gap: 10px; }
    .row-flex .half { flex: 1; }
    input[type="text"], select { width: 100%; padding: 12px; margin-top: 5px; background-color: #fff; border-width: 1px;}
    .radio-group, .checkbox-group { margin-top: 5px; display: flex; gap: 15px 0; flex-wrap: wrap; justify-content: space-between;}
    .radio-group input[type="radio"],
    .checkbox-group input[type="checkbox"] { display: none; }
    .radio-group label, .checkbox-group label {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 5px; border: 2px solid #ccc; border-radius: 25px;
      background: #fff; color: #555; font-weight: bold; font-size: 0.75em;
      cursor: pointer; transition: background 0.2s, border-color 0.2s, color 0.2s;
      user-select: none; -webkit-tap-highlight-color: transparent;
      width: 48%; margin-top: 0;
    }
    .radio-group label:has(input:checked),
    .checkbox-group label:has(input:checked) { background: #b94100; border-color: #b94100; color: #fff; }
    .radio-group label:hover, .checkbox-group label:hover { border-color: #b94100; color: #b94100; }
    .radio-group label:has(input:checked):hover,
    .checkbox-group label:has(input:checked):hover { color: #fff; }
    button { width: 100%; padding: 15px; background: #1a7a3c; color: white; border: none; border-radius: 30px; margin-top: 25px; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { text-align: center; margin-top: 10px; color: #666; font-size: 0.9em; }
    .req { background: #c00; color: #fff; font-size: 0.65em; padding: 2px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; font-weight: normal; }
    .opt { background: #999; color: #fff; font-size: 0.65em; padding: 2px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; font-weight: normal; }
    #player-fields, #staff-fields { display: none; }
    #player-fields.visible, #staff-fields.visible { display: block; }
    .section-title { margin-top: 35px; padding: 8px 12px; background: #1d4c94; color: #fff; font-weight: bold; border-radius: 5px; font-size: 0.9em; }
    .radio-group.three label { width: 31%; }
    .privacy-wrap { text-align: center; margin-top: 35px; font-size: 0.9em; }
    .privacy-label { display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-weight: normal; margin-top: 0; }
    .privacy-checkbox { width: auto; margin-right: 8px; transform: scale(1.2); }
    .privacy-link { color: #1d4c94; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2>加賀地区トレセンプロフィール入力</h2>

    <form id="profileForm">

      <!-- 氏名 -->
      <div class="row-flex">
        <div class="half">
          <label>氏 <span class="req">必須</span></label>
          <input type="text" name="name_2nd" placeholder="例: 山田" required>
        </div>
        <div class="half">
          <label>名 <span class="req">必須</span></label>
          <input type="text" name="name_1st" placeholder="例: 太郎" required>
        </div>
      </div>

      <div class="row-flex">
        <div class="half">
          <label>シ <span class="req">必須</span></label>
          <input type="text" name="kana_2nd" placeholder="例: ヤマダ" required>
        </div>
        <div class="half">
          <label>メイ <span class="req">必須</span></label>
          <input type="text" name="kana_1st" placeholder="例: タロウ" required>
        </div>
      </div>

      <label>生年月日 <span class="req">必須</span></label>
      <div class="row-flex" id="birthday-selector">
        <div class="half">
          <select name="birth_year"></select>
        </div>
        <div class="half">
          <select name="birth_month"></select>
        </div>
        <div class="half">
          <select name="birth_day"></select>
        </div>
      </div>

      <label>所属チーム（正式名称）<span class="req">必須</span></label>
      <input type="text" name="team" placeholder="例: 南加賀FC" required>

      <!-- 所属年度 -->
      <input type="hidden" name="year" checked value="2026">

      <label>所属カテゴリ <span class="req">必須</span></label>
      <div class="radio-group three">
        <label><input type="radio" name="group" value="11"> U11</label>
        <label><input type="radio" name="group" value="12"> U12</label>
        <label><input type="radio" name="group" value="指導者"> 指導者</label>
      </div>

      <div id="tell-fields">
        <div class="section-title">▼ 住所・連絡先</div>

        <label>郵便番号 <span class="req">必須</span></label>
        <input type="text" name="postal_code" placeholder="例: 922-0000" required>

        <label>都道府県・市区町村 <span class="req">必須</span></label>
        <input type="text" name="address_1st" placeholder="例: 石川県加賀市" required>

        <label>番地 <span class="req">必須</span></label>
        <input type="text" name="address_3rd" placeholder="例: 3丁目-1-1" required>

        <label>建物名など <span class="opt">任意</span></label>
        <input type="text" name="address_4th" placeholder="例: 加賀ビル101">

        <label>電話番号 <span class="req">必須</span></label>
        <input type="text" name="phone" placeholder="例: 090-1234-5678" required>

        <label>緊急連絡先 <span class="req">必須</span></label>
        <input type="text" name="emergency_phone" placeholder="例: 090-1234-5678" required>        
      </div>



      <!-- 選手用項目 -->
      <div id="player-fields">
        <div class="section-title">▼ 選手情報</div>

        <label>JFA選手登録番号 <span class="req">必須</span></label>
        <input type="text" name="jfa_number" placeholder="例: 1234567890" data-required>

        <label>シャツのサイズ <span class="req">必須</span></label>
        <div class="radio-group three">
          <label><input type="radio" name="size" value="S"> S</label>
          <label><input type="radio" name="size" value="M"> M</label>
          <label><input type="radio" name="size" value="L"> L</label>
        </div>

        <label>保護者名 <span class="req">必須</span></label>
        <input type="text" name="parent_name" placeholder="例: 山田 次郎" data-required>

        <label>身長 <span class="req">必須</span></label>
        <input type="text" name="height" placeholder="例: 150" data-required>

        <label>体重 <span class="req">必須</span></label>
        <input type="text" name="weight" placeholder="例: 45" data-required>
      </div>

      <!-- 指導者用項目 -->
      <div id="staff-fields">
        <div class="section-title">▼ 指導者情報</div>

        <label>指導者登録番号 <span class="req">必須</span></label>
        <input type="text" name="staff_number" placeholder="例: 1234567890" data-required>
      </div>

      <!-- プライバシーポリシー同意チェック -->
      <div class="privacy-wrap">
        <label class="privacy-label">
          <input type="checkbox" id="agreePrivacy" class="privacy-checkbox" onchange="toggleSubmitButton()">
          <span><a href="privacy_policy.html" target="_blank" rel="noopener noreferrer" class="privacy-link">プライバシーポリシー</a>に同意する</span>
        </label>
      </div>

      <button type="button" id="submitBtn" disabled onclick="submitData()">登録する</button>

      <div id="status"></div>
    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = '2008893549-jeCNKx4Y';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwyP8C1L82E3WgFGPN0xmQ-KhiTISg-hB6qZNtweSfGyHQj11wm6RYydBpaOa-qBTDoPA/exec';

    function isLocalEnvironment() {
      return window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    }

    // プライバシーポリシー同意チェックでボタンの有効/無効を切り替える
    function toggleSubmitButton() {
      const isAgreed = document.getElementById('agreePrivacy').checked;
      document.getElementById('submitBtn').disabled = !isAgreed;
    }    

    // 選手/指導者フィールドの表示切り替え
    function toggleGroupFields(value) {
      const playerFields = document.getElementById('player-fields');
      const staffFields  = document.getElementById('staff-fields');
      const isPlayer = (value === '11' || value === '12');
      const isStaff  = (value === '指導者');

      playerFields.classList.toggle('visible', isPlayer);
      staffFields.classList.toggle('visible', isStaff);

      // required の付け外し（data-required 属性を持つ input のみ対象）
      playerFields.querySelectorAll('[data-required]').forEach(el => {
        isPlayer ? el.setAttribute('required', '') : el.removeAttribute('required');
      });
      staffFields.querySelectorAll('[data-required]').forEach(el => {
        isStaff ? el.setAttribute('required', '') : el.removeAttribute('required');
      });
    }

    window.onload = async function() {
      const status = document.getElementById('status');

      // --- 生年月日セレクトボックス生成 ---
      const yearSelect  = document.querySelector('select[name="birth_year"]');
      const monthSelect = document.querySelector('select[name="birth_month"]');
      const daySelect   = document.querySelector('select[name="birth_day"]');
      const currentYear = new Date().getFullYear();
      const yearEnd     = currentYear - 9;
      const yearStart   = currentYear - 80;
      const defaultYear = currentYear - 12;
      for (let i = yearEnd; i >= yearStart; i--) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i + '年';
        if (i === defaultYear) option.selected = true;
        yearSelect.appendChild(option);
      }
      for (let i = 1; i <= 12; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i + '月';
        monthSelect.appendChild(option);
      }
      for (let i = 1; i <= 31; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i + '日';
        daySelect.appendChild(option);
      }

      // --- 郵便番号からの住所自動入力 ---
      const postalCodeInput = document.querySelector('input[name="postal_code"]');
      postalCodeInput.addEventListener('keyup', async () => {
        const postalCode = postalCodeInput.value.replace('-', '');
        if (postalCode.length === 7) {
          status.innerText = "住所を検索中...";
          try {
            const response = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${postalCode}`);
            const data = await response.json();
            if (data.status === 200 && data.results) {
              const result = data.results[0];
              document.querySelector('input[name="address_1st"]').value = result.address1 + result.address2 + result.address3;
              status.innerText = "";
            } else {
              status.innerText = "住所が見つかりませんでした。";
            }
          } catch (error) {
            status.innerText = "住所の取得に失敗しました。";
          }
        }
      });

      // --- 所属カテゴリ切り替えイベント登録 ---
      document.querySelectorAll('input[name="group"]').forEach(radio => {
        radio.addEventListener('change', () => toggleGroupFields(radio.value));
      });

      // 初期表示状態を反映
      const checkedGroup = document.querySelector('input[name="group"]:checked');
      toggleGroupFields(checkedGroup ? checkedGroup.value : '');

      // ローカル環境ではLIFF処理をスキップ
      if (isLocalEnvironment()) {
        status.innerText = "ローカル環境で起動中...";
        return;
      }

      // --- LIFF初期化・データ取得 ---
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        status.innerText = "データ読み込み中...";
        const profile  = await liff.getProfile();
        const response = await fetch(`${GAS_URL}?line_id=${profile.userId}`);
        const result   = await response.json();
        console.log("GAS取得データ:", result);
        if (result) {
          Object.keys(result).forEach(key => {
            const elements = document.getElementsByName(key);
            if (elements.length > 0) {
              const el = elements[0];
              if (el.type === 'radio') {
                const radio = document.querySelector(`input[name="${key}"][value="${result[key]}"]`);
                if (radio) radio.checked = true;
              } else if (el.type === 'checkbox') {
                let values = [];
                if (Array.isArray(result[key])) {
                  values = result[key].map(s => String(s).trim());
                } else if (result[key]) {
                  values = String(result[key]).split(',').map(s => s.trim());
                }
                values.forEach(val => {
                  const cb = document.querySelector(`input[name="${key}"][value="${val}"]`);
                  if (cb) cb.checked = true;
                });
              } else {
                el.value = result[key];
              }
            }
          });
          // データ反映後に表示切り替えを再適用
          const groupEl = document.querySelector('input[name="group"]:checked');
          if (groupEl) toggleGroupFields(groupEl.value);
        }
        status.innerText = "";
      } catch (err) {
        status.innerText = "初期化エラー: " + err.message;
      }
    };

    async function submitData() {
      // 所属カテゴリの必須チェック（ラジオはrequiredが効かないためJS検証）
      const groupChecked = document.querySelector('input[name="group"]:checked');
      if (!groupChecked) {
        alert('所属カテゴリを選択してください。');
        return;
      }
      // 選手用: シャツのサイズチェック
      const groupVal = groupChecked.value;
      if ((groupVal === '11' || groupVal === '12') && !document.querySelector('input[name="size"]:checked')) {
        alert('シャツのサイズを選択してください。');
        return;
      }

      const button = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      button.disabled = true;
      status.innerText = "送信中...";

      try {
        let profile = { userId: "dummy_id", displayName: "Dummy User" };
        if (!isLocalEnvironment()) {
          profile = await liff.getProfile();
        }

        const data = {
          line_id:   profile.userId,
          line_name: profile.displayName
        };

        const formElements = document.querySelectorAll('input[name], select[name], textarea[name]');
        formElements.forEach(el => {
          const name = el.name;
          if (['birth_year', 'birth_month', 'birth_day'].includes(name)) return;
          if (el.type === 'radio') {
            if (el.checked) data[name] = el.value;
          } else if (el.type === 'checkbox') {
            if (!data[name]) data[name] = [];
            if (el.checked) data[name].push(el.value);
          } else {
            data[name] = el.value;
          }
        });

        const year  = document.querySelector('select[name="birth_year"]').value;
        const month = document.querySelector('select[name="birth_month"]').value.padStart(2, '0');
        const day   = document.querySelector('select[name="birth_day"]').value.padStart(2, '0');
        data['birthday'] = `${year}-${month}-${day}`;

        for (let key in data) {
          if (Array.isArray(data[key])) data[key] = data[key].join(', ');
        }

        if (isLocalEnvironment()) {
          await new Promise(resolve => setTimeout(resolve, 1000));
          console.log("送信データ:", data);
          alert("登録完了！（ローカルダミー送信）");
        } else {
          const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(data)
          });
          const result = await response.json();
          if (result.status === 'success') {
            alert("登録完了！");
            liff.closeWindow();
          } else {
            alert("エラーが発生しました: " + result.message);
          }
        }
      } catch (err) {
        alert("通信エラー: " + err.message);
      } finally {
        button.disabled = false;
        status.innerText = "";
      }
    }
  </script>
</body>
</html>
